<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FDEFE0"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app background (macOS squircle-ish) -->
  <rect x="40" y="40" width="944" height="944" rx="212" fill="url(#bg)"/>
  <!-- soft top sheen -->
  <rect x="40" y="40" width="944" height="470" rx="212" fill="#FFFFFF" opacity="0.10"/>

  <!-- drop shadow under the terminal -->
  <rect x="206" y="304" width="612" height="470" rx="60" fill="#0B1220" opacity="0.18"/>
  <!-- terminal body -->
  <rect x="196" y="288" width="612" height="470" rx="60" fill="url(#screen)" stroke="#E7CBB0" stroke-width="4"/>

  <!-- title bar traffic lights -->
  <circle cx="270" cy="352" r="19" fill="#FF6B6B"/>
  <circle cx="330" cy="352" r="19" fill="#FCD34D"/>
  <circle cx="390" cy="352" r="19" fill="#34D399"/>

  <!-- cheeks (blush) -->
  <ellipse cx="356" cy="586" rx="40" ry="24" fill="#FCA5A5" opacity="0.55"/>
  <ellipse cx="648" cy="586" rx="40" ry="24" fill="#FCA5A5" opacity="0.55"/>

  <!-- eyes -->
  <circle cx="416" cy="520" r="46" fill="#2D3748"/>
  <circle cx="588" cy="520" r="46" fill="#2D3748"/>
  <!-- eye sparkles -->
  <circle cx="401" cy="505" r="15" fill="#FFFFFF"/>
  <circle cx="573" cy="505" r="15" fill="#FFFFFF"/>
  <circle cx="430" cy="536" r="7" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="602" cy="536" r="7" fill="#FFFFFF" opacity="0.8"/>

  <!-- happy smile -->
  <path d="M 446 600 Q 502 656 558 600" fill="none" stroke="#2D3748"
        stroke-width="16" stroke-linecap="round"/>

  <!-- green terminal prompt ">_" in the corner -->
  <path d="M 300 690 L 326 708 L 300 726" fill="none" stroke="#10B981"
        stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="342" y="716" width="48" height="12" rx="6" fill="#10B981"/>
</svg>
