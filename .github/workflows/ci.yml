name: CI

# Cross-platform build + test matrix (SRS NFR-006: three-platform CI green is a
# merge gate). Windows uses the ConPTY Pty path + Winsock; Linux/macOS use
# forkpty. All builds link the same permissive deps (ADR_6).
on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS pinned to 14: the macOS 15 SDK on macos-latest dropped the legacy
        # AGL framework that prebuilt Qt 6.7 still links (`ld: framework 'AGL' not
        # found`). macos-14 (Apple Silicon) keeps AGL.
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Runner CMake is 4.x, which removed <3.5 compatibility that libssh (3.3)
      # and the vcpkg toolchain still rely on. Pin 3.31 on Windows.
      - name: Pin CMake 3.31 (Windows)
        if: runner.os == 'Windows'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtserialport'

      # --- Linux deps ---
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libvterm-dev libssh2-1-dev libssh-dev ninja-build

      # --- macOS deps ---
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 libvterm libssh2 libssh ninja

      # --- Windows: MSVC env, vcpkg deps, and vendored libvterm ---
      # libvterm has NO vcpkg port, so it is vendored from the neovim fork and
      # compiled to a static vterm.lib (see scripts/win/build-libvterm.ps1).
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install openssl libssh2 zlib pkgconf --triplet x64-windows

      - name: Vendor libvterm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/neovim/libvterm.git "$env:RUNNER_TEMP/libvterm"
          ./scripts/win/build-libvterm.ps1 -Src "$env:RUNNER_TEMP/libvterm" -Out "$env:RUNNER_TEMP/libvterm/_build"

      # libssh (server-capable) has no vcpkg port that reliably downloads; vendor +
      # build it so the embedded SSH/SFTP server is compiled + tested on Windows too.
      - name: Vendor libssh (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/win/build-libssh.ps1 -Out "$env:RUNNER_TEMP/libssh"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          "-DVTERM_LIB=$env:RUNNER_TEMP/libvterm/_build/vterm.lib"
          "-DVTERM_INCLUDE=$env:RUNNER_TEMP/libvterm/include"
          "-DSSH_LIB=$env:RUNNER_TEMP/libssh/_build/src/ssh.lib"
          "-DSSH_INCLUDE=$env:RUNNER_TEMP/libssh/include;$env:RUNNER_TEMP/libssh/_build/include"

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      # Linux is capped to 2 parallel jobs: the runner has 16 GB and building the
      # ~70 Qt test executables at full core count exhausts memory, which the
      # runner watchdog kills as SIGTERM (exit 143). macOS/Windows build at full.
      - name: Build
        run: cmake --build build --parallel ${{ runner.os == 'Linux' && '2' || '' }}

      - name: Test
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

  # Cross-compile the Windows ConPTY code path to a real Windows PE binary from
  # Linux (MinGW) — proves the Windows-specific platform code is valid Win32
  # even outside the full Windows matrix job.
  windows-conpty-crosscompile:
    name: windows-conpty (mingw cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64
      - name: Cross-compile ConPTY check
        run: MINGW_CXX=x86_64-w64-mingw32-g++ scripts/win/build-check.sh

  # Live protocol e2e against deployed server fixtures (Linux only — needs
  # Docker). Runs the guarded-live SSH test against a real sshd container.
  live-e2e:
    name: live-e2e (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtserialport'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libvterm-dev libssh2-1-dev ninja-build
      - name: Build
        # Capped to 2 jobs — same 16 GB OOM guard as the matrix Linux build.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Deploy SSH fixture
        run: docker compose -f tests/fixtures/docker-compose.yml up -d && sleep 5
      - name: Run live SSH e2e
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
          MACXTERM_SSH_TEST_HOST: 127.0.0.1
          MACXTERM_SSH_TEST_PORT: "2222"
          MACXTERM_SSH_TEST_USER: tester
          MACXTERM_SSH_TEST_PASS: testpass
        run: ./tests/test_ssh_live
